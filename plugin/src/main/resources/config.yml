# Configuration Survisland Plugin
# Plugin Minecraft pour Survisland avec intégration Discord

# Configuration Discord
discord:
  # Token du bot Discord
  token: ""
  
  # ID du channel Discord pour les messages /live
  live-channel-id: ""
  
  # Format des messages Discord
  message-format: "**{sender} »** {message}"
  
  # Format des messages confess (sans le sender pour l'anonymat)
  confess-format: "🎮 {message}"

# Configuration du chat spectateur (non implémenté)
chatspec:
  # Activer le chat spectateur
  enabled: false
  
  # Préfixe pour le chat spectateur
  prefix: "[SPEC]"
  
  # Couleur du chat spectateur
  color: "GRAY"