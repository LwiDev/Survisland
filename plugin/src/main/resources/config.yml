# Configuration Survisland Plugin
# Plugin Minecraft pour Survisland avec intégration Discord

# Configuration Discord
discord:
  # Token du bot Discord
  token: ""
  
  # ID du channel Discord pour les messages /live
  live-channel-id: ""
  
  # Format des messages Discord
  message-format: "**{sender} »** {message}"
  
  # Format des messages confess (sans le sender pour l'anonymat)
  confess-format: "🎮 {message}"

# Configuration du menu /menu (gestion joueurs/équipes/partie)
menu:
  # Messages d'annonce prédéfinis, proposés en un clic dans le menu Partie > Annonces
  # (en plus de la saisie libre via enclume, pour les messages qui reviennent à chaque partie)
  announcement-presets:
    - "Immunité dans 30 minutes"
    - "Immunité dans 10 minutes"
    - "Confort dans 30 minutes"
    - "Confort dans 10 minutes"

  # Pseudos des deux joueurs notifiés (via un title en jeu) quand une place se libère
  vote-recipients:
    gold: "GoldVision98"
    marcus: "Marcouscous"

# Configuration du chat spectateur (non implémenté)
chatspec:
  # Activer le chat spectateur
  enabled: false
  
  # Préfixe pour le chat spectateur
  prefix: "[SPEC]"
  
  # Couleur du chat spectateur
  color: "GRAY"

# Configuration de la commande /follow (suivre un joueur en mode spectateur)
follow:
  # Distance (en blocs) au-delà de laquelle le suiveur est téléporté vers le joueur suivi
  max-distance: 15

  # Intervalle de vérification de la distance, en ticks (20 ticks = 1 seconde)
  check-interval-ticks: 10